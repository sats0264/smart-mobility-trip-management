version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mobility-network

  trip-management-service:
    build: .
    container_name: trip-management-service
    ports:
      - "8200:8200"
    depends_on:
      - rabbitmq
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - mobility-network

networks:
  mobility-network:
    driver: bridge