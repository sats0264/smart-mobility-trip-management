# 1. Identité exacte (doit correspondre au nom du fichier sur Git)
spring.application.name=trip-management-service

# 2. Importer la config depuis le serveur
spring.config.import=optional:configserver:http://localhost:8888

# 3. Mapping centralisé (SANS VALEURS PAR DÉFAUT pour tester la liaison)
server.port=${trip-management-service.uriport}

spring.datasource.url=${trip-management-service.datasource.url}
spring.datasource.username=${trip-management-service.datasource.username}
spring.datasource.password=${trip-management-service.datasource.password}

# On force l'échec si le config server est injoignable
spring.cloud.config.fail-fast=true